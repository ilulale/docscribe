services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docscribe
      POSTGRES_PASSWORD: docscribe
      POSTGRES_DB: docscribe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docscribe"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://docscribe:docscribe@postgres/docscribe
      DATABASE_URL_SYNC: postgresql://docscribe:docscribe@postgres/docscribe
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: docscribe
      MINIO_SECURE: "false"
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: google/gemini-3.1-flash-lite
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: '["http://localhost:80","http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    command: ./entrypoint-worker.sh
    environment:
      DATABASE_URL: postgresql+asyncpg://docscribe:docscribe@postgres/docscribe
      DATABASE_URL_SYNC: postgresql://docscribe:docscribe@postgres/docscribe
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: docscribe
      MINIO_SECURE: "false"
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: google/gemini-3.1-flash-lite
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  redis_data:
